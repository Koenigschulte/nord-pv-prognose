name: Health Auto-Heal

# Prüft regelmäßig den Health-Endpoint und rebootet bei Ausfall
# automatisch den Hetzner-Cloud-Server über die Hetzner Cloud API.
#
# Benötigte GitHub-Secrets (Repo > Settings > Secrets and variables > Actions):
#   HCLOUD_TOKEN        Hetzner Cloud API-Token mit Schreibrechten (Read & Write)
#                       -> console.hetzner.cloud > Security > API Tokens
#   HCLOUD_SERVER_NAME  Name des Servers in der Hetzner Cloud (z. B. "koeschu")
#                       Alternativ HCLOUD_SERVER_ID als Server-ID setzen.
#
# Optionale GitHub-Variables (Repo > Settings > Secrets and variables > Actions > Variables):
#   HEALTH_URL          Health-Endpoint (Default: https://koeschu.com/api/health)
#   HEALTH_TIMEOUT      Timeout pro Versuch in Sekunden (Default: 15)
#   HEALTH_RETRIES      Anzahl Versuche bevor als "down" gewertet wird (Default: 3)

on:
  schedule:
    - cron: "*/5 * * * *"   # alle 5 Minuten
  workflow_dispatch:         # manueller Start über die Actions-UI

# Verhindert parallele Läufe (z. B. wenn ein Reboot noch läuft)
concurrency:
  group: health-autoheal
  cancel-in-progress: false

permissions:
  contents: read
  issues: write              # für die Ausfall-Benachrichtigung als Issue

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Health-Check + Auto-Reboot
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SERVER_NAME: ${{ secrets.HCLOUD_SERVER_NAME }}
          HCLOUD_SERVER_ID: ${{ secrets.HCLOUD_SERVER_ID }}
          HEALTH_URL: ${{ vars.HEALTH_URL || 'https://koeschu.com/api/health' }}
          HEALTH_TIMEOUT: ${{ vars.HEALTH_TIMEOUT || '15' }}
          HEALTH_RETRIES: ${{ vars.HEALTH_RETRIES || '3' }}
        run: |
          set -uo pipefail

          echo "::group::Health-Check"
          ok=0
          for i in $(seq 1 "$HEALTH_RETRIES"); do
            code="$(curl -s -o /dev/null -w '%{http_code}' -m "$HEALTH_TIMEOUT" -L "$HEALTH_URL" || echo 000)"
            echo "Versuch $i/$HEALTH_RETRIES -> HTTP $code  ($HEALTH_URL)"
            if [ "$code" -ge 200 ] 2>/dev/null && [ "$code" -lt 400 ] 2>/dev/null; then
              ok=1; break
            fi
            sleep 5
          done
          echo "::endgroup::"

          if [ "$ok" -eq 1 ]; then
            echo "✓ Health OK — nichts zu tun."
            exit 0
          fi

          echo "✗ Health-Check fehlgeschlagen nach $HEALTH_RETRIES Versuchen."

          if [ -z "${HCLOUD_TOKEN:-}" ]; then
            echo "::error::HCLOUD_TOKEN nicht gesetzt — kann nicht rebooten."
            exit 1
          fi

          # Server-ID ermitteln (falls nur Name gesetzt ist)
          sid="${HCLOUD_SERVER_ID:-}"
          if [ -z "$sid" ]; then
            if [ -z "${HCLOUD_SERVER_NAME:-}" ]; then
              echo "::error::Weder HCLOUD_SERVER_ID noch HCLOUD_SERVER_NAME gesetzt."
              exit 1
            fi
            echo "::group::Server-ID auflösen ($HCLOUD_SERVER_NAME)"
            sid="$(curl -s -m 20 -H "Authorization: Bearer $HCLOUD_TOKEN" \
                    "https://api.hetzner.cloud/v1/servers?name=$HCLOUD_SERVER_NAME" \
                    | jq -r '.servers[0].id // empty')"
            echo "Server-ID: ${sid:-<keine>}"
            echo "::endgroup::"
          fi

          if [ -z "$sid" ]; then
            echo "::error::Server '$HCLOUD_SERVER_NAME' nicht gefunden (Token-Projekt korrekt?)."
            exit 1
          fi

          # Aktuellen Power-Status holen
          status="$(curl -s -m 20 -H "Authorization: Bearer $HCLOUD_TOKEN" \
                    "https://api.hetzner.cloud/v1/servers/$sid" | jq -r '.server.status // "unknown"')"
          echo "Aktueller Server-Status: $status"

          # Aktion wählen: läuft -> reboot (sanft), sonst -> poweron
          if [ "$status" = "running" ]; then
            action="reboot"
          else
            action="poweron"
          fi

          echo "::group::Aktion '$action' auf Server $sid"
          resp="$(curl -s -m 30 -X POST \
                   -H "Authorization: Bearer $HCLOUD_TOKEN" \
                   "https://api.hetzner.cloud/v1/servers/$sid/actions/$action")"
          echo "$resp" | jq . 2>/dev/null || echo "$resp"
          echo "::endgroup::"

          act_status="$(echo "$resp" | jq -r '.action.status // "error"' 2>/dev/null)"
          if [ "$act_status" = "error" ] || echo "$resp" | grep -q '"error"'; then
            echo "::error::Reboot-Befehl fehlgeschlagen."
            echo "result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "→ '$action' ausgelöst (Action-Status: $act_status). Warte auf Recovery…"

          # Auf Recovery warten (bis zu ~2 Min)
          recovered=0
          for i in $(seq 1 24); do
            sleep 5
            code="$(curl -s -o /dev/null -w '%{http_code}' -m "$HEALTH_TIMEOUT" -L "$HEALTH_URL" || echo 000)"
            echo "Recovery-Check $i -> HTTP $code"
            if [ "$code" -ge 200 ] 2>/dev/null && [ "$code" -lt 400 ] 2>/dev/null; then
              recovered=1; break
            fi
          done

          if [ "$recovered" -eq 1 ]; then
            echo "✓ Wieder erreichbar nach '$action'."
          else
            echo "::warning::Nach '$action' noch nicht erreichbar — bitte manuell prüfen."
          fi

          {
            echo "down=true"
            echo "action=$action"
            echo "recovered=$recovered"
          } >> "$GITHUB_OUTPUT"
        id: heal

      - name: Ausfall als Issue melden
        if: steps.heal.outputs.down == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const recovered = '${{ steps.heal.outputs.recovered }}' === '1';
            const action = '${{ steps.heal.outputs.action }}';
            const url = process.env.HEALTH_URL || 'https://koeschu.com/api/health';
            const title = `🔴 Health-Ausfall erkannt${recovered ? ' (automatisch behoben)' : ''}`;
            const body = [
              `**Health-Endpoint:** ${url}`,
              `**Aktion:** \`${action}\` über Hetzner Cloud API ausgelöst.`,
              `**Ergebnis:** ${recovered ? '✅ wieder erreichbar' : '⚠️ noch nicht erreichbar — bitte manuell prüfen'}`,
              `**Zeit:** ${new Date().toISOString()}`,
              ``,
              `_Automatisch erstellt von der Health-Auto-Heal-Action._`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident'],
            });
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL || 'https://koeschu.com/api/health' }}
